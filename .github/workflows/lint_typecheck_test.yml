name: Lint, Typecheck, Test

on:
  pull_request:
  
jobs:
  lint-and-typecheck:
    name: Lint & TS check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
